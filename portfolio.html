<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Πορτφόλιο | Keen Eye Advertising</title>
  <meta name="description" content="Η Keen Eye Adv προσφέρει ολοκληρωμένες διαφημιστικές λύσεις από το 1995.">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#F7F3ED;--ink:#171310;--mid:#4A423C;--rule:#D8D0C4;--acc:#C4622D;
      --serif:'Libre Baskerville',Georgia,serif;--sans:'Manrope',sans-serif;
    }
    body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}

    /* NAV */
    nav{padding:24px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--rule)}
    @media(min-width:768px){nav{padding:28px 80px}}
    .nav-links{display:none;gap:48px;align-items:center}
    @media(min-width:768px){.nav-links{display:flex}}
    .nav-links a{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--mid);text-decoration:none;transition:color .15s}
    .nav-links a:hover{color:var(--ink)}
    .mob-btn{display:flex;flex-direction:column;gap:5px;padding:8px;background:none;border:none;cursor:pointer}
    .mob-btn span{width:22px;height:1.5px;background:var(--ink);transition:all .2s}
    @media(min-width:768px){.mob-btn{display:none}}
    .mob-nav{display:none;padding:24px 40px;border-bottom:1px solid var(--rule);background:var(--bg)}
    .mob-nav.open{display:block}
    .mob-nav a{display:block;padding:12px 0;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);text-decoration:none;border-bottom:1px solid var(--rule)}
    .mob-nav a:last-child{border:none}
    .mob-nav a:hover{color:var(--ink)}

    /* HERO */
    .hero{position:relative;padding:60px 40px 80px;display:grid;grid-template-columns:1fr;gap:48px;overflow:hidden;}
    @media(min-width:768px){.hero{padding:80px 80px 120px;grid-template-columns:1fr 1fr;gap:0}}
    .hero-bg{position:absolute;inset:0;z-index:-1;background:var(--bg)}
    .hero-slide{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 2s ease-in-out;}
    .hero-slide.active{opacity:0.15;}
    .h-left{padding-right:0;position:relative;}
    @media(min-width:768px){.h-left{padding-right:80px;border-right:1px solid rgba(0,0,0,0.1)}}
    .h-tag{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--acc);margin-bottom:32px}
    @media(min-width:768px){.h-tag{margin-bottom:40px}}
    h1{font-family:var(--serif);font-size:clamp(36px,6vw,72px);font-weight:400;line-height:1.1;letter-spacing:-.02em}
    h1 em{font-style:italic;display:block;color:var(--mid)}
    .h-body{font-size:14px;line-height:1.85;color:var(--mid);max-width:380px;margin-top:28px;font-weight:300}
    .h-actions{margin-top:40px;display:flex;flex-wrap:wrap;align-items:center;gap:20px}
    .h-btn{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink);text-decoration:none;border-bottom:1px solid var(--ink);padding-bottom:2px;transition:color .2s,border-color .2s}
    .h-btn:hover{color:var(--acc);border-color:var(--acc)}
    .h-ig{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);text-decoration:none;transition:color .15s;display:inline-flex;align-items:center;gap:6px}
    .h-ig:hover{color:var(--acc)}
    .h-right{padding-left:0;display:flex;flex-direction:column;gap:0;position:relative;}
    @media(min-width:768px){.h-right{padding-left:80px}}
    .h-stat{padding:28px 0;border-bottom:1px solid rgba(0,0,0,0.1)}
    @media(min-width:768px){.h-stat{padding:36px 0}}
    .h-stat:first-child{padding-top:0}
    .h-num{font-family:var(--serif);font-size:clamp(56px,7vw,80px);font-weight:700;line-height:1;color:var(--ink)}
    .h-num sup{font-size:50%;color:var(--acc);vertical-align:super}
    .h-lbl{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mid);margin-top:10px}
    .h-loc{padding-top:32px;font-size:13px;color:var(--mid);font-weight:300;line-height:1.8}
    .h-loc strong{display:block;font-family:var(--serif);font-size:20px;font-weight:400;color:var(--ink);margin-bottom:6px}

    /* DIVIDER */
    .divider{height:1px;background:var(--rule);margin:0 40px}
    @media(min-width:768px){.divider{margin:0 80px}}

    /* PRODUCTS */
    .products{padding:80px 40px}
    @media(min-width:768px){.products{padding:100px 80px}}
    .sec-label{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--acc);margin-bottom:16px}
    .sec-title{font-family:var(--serif);font-size:clamp(28px,4vw,48px);font-weight:400;letter-spacing:-.01em;margin-bottom:48px}
    .prod-grid{display:grid;grid-template-columns:1fr;gap:24px}
    @media(min-width:640px){.prod-grid{grid-template-columns:repeat(2,1fr)}}
    @media(min-width:1024px){.prod-grid{grid-template-columns:repeat(3,1fr)}}
    .prod-tile{display:flex;flex-direction:column;gap:16px;text-decoration:none;transition:transform 0.3s ease;padding:0;}
    .prod-tile:hover{transform:translateY(-4px)}
    .prod-img-wrap{position:relative;width:100%;aspect-ratio:4/3;overflow:hidden;border-radius:2px;}
    .prod-tile-img{width:100%;height:100%;object-fit:cover;transition:transform 0.6s ease}
    .prod-overlay{position:absolute;inset:0;background:rgba(23,19,16,0.6);opacity:0;transition:opacity 0.4s ease;display:flex;align-items:center;justify-content:center}
    .prod-overlay span{color:#fff;font-size:13px;letter-spacing:0.18em;text-transform:uppercase;transform:translateY(10px);transition:transform 0.4s ease}
    .prod-tile:hover .prod-tile-img{transform:scale(1.05)}
    .prod-tile:hover .prod-overlay{opacity:1}
    .prod-tile:hover .prod-overlay span{transform:translateY(0)}
    .prod-tile > span{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);text-align:center;font-weight:500;display:block;width:100%;}

    /* PORTFOLIO */
    .portfolio{padding:80px 40px}
    @media(min-width:768px){.portfolio{padding:100px 80px}}
    .port-filters{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:40px}
    .p-filt{background:none;border:none;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);cursor:pointer;padding:8px 16px;border-radius:20px;transition:all 0.2s}
    .p-filt:hover{color:var(--ink)}
    .p-filt.active{background:var(--ink);color:var(--bg)}
    .port-grid{display:grid;grid-template-columns:1fr;gap:16px}
    @media(min-width:640px){.port-grid{grid-template-columns:repeat(2,1fr)}}
    @media(min-width:1024px){.port-grid{grid-template-columns:repeat(4,1fr)}}
    .port-item{position:relative;width:100%;aspect-ratio:4/5;overflow:hidden;background:var(--rule);cursor:zoom-in;display:none}
    .port-item.visible{display:block}
    .port-item img{width:100%;height:100%;object-fit:cover;transition:transform 0.6s ease}
    .port-item:hover img{transform:scale(1.05)}
    .port-load{margin-top:48px;display:flex;justify-content:center}
    .port-load button{background:transparent;border:1px solid var(--ink);color:var(--ink);font-size:11px;letter-spacing:.18em;text-transform:uppercase;padding:14px 32px;cursor:pointer;transition:all 0.2s}
    .port-load button:hover{background:var(--ink);color:var(--bg)}

    /* LIGHTBOX */
    .lightbox{position:fixed;inset:0;background:rgba(23,19,16,0.95);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity 0.3s}
    .lightbox.active{display:flex;opacity:1}
    .lightbox img{max-width:100%;max-height:90vh;object-fit:contain}
    .lb-close{position:absolute;top:20px;right:30px;background:none;border:none;color:#fff;font-size:40px;cursor:pointer;font-weight:300;line-height:1}

    /* SERVICES (desktop only) */
    .services{display:none;padding:100px 80px;border-top:1px solid var(--rule)}
    @media(min-width:768px){.services{display:block}}
    .svc-grid{display:grid;grid-template-columns:1fr;gap:40px}
    @media(min-width:1024px){.svc-grid{grid-template-columns:repeat(2,1fr);column-gap:80px;row-gap:56px}}
    .svc-card{background:transparent;padding:0;display:flex;gap:24px;align-items:flex-start}
    .svc-n{font-family:var(--serif);font-size:28px;color:var(--acc);font-style:italic;line-height:1;margin-top:2px}
    .svc-content{display:flex;flex-direction:column;gap:8px}
    .svc-name{font-family:var(--serif);font-size:22px;font-weight:400;color:var(--ink)}
    .svc-desc{font-size:14px;color:var(--mid);line-height:1.7;font-weight:300}

    /* ABOUT */
    .about{padding:80px 40px;border-top:1px solid var(--rule);max-width:1200px;margin:0 auto}
    @media(min-width:768px){.about{padding:120px 80px}}
    .about-top{display:flex;flex-direction:column;align-items:center;text-align:center;gap:32px;margin-bottom:60px;max-width:900px;margin-inline:auto}
    .about-top h2{font-family:var(--serif);font-size:clamp(36px,5vw,56px);font-weight:400;line-height:1.2;letter-spacing:-.01em;margin-bottom:16px;color:var(--ink)}
    .about-top p{font-size:16px;color:var(--mid);line-height:1.9;font-weight:300;margin-bottom:0}
    .about-media{display:grid;grid-template-columns:1fr;gap:20px;width:100%}
    @media(min-width:768px){.about-media{grid-template-columns:1fr 1fr}}
    .about-media video{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:2px}

    /* CONTACT */
    .contact{padding:80px 40px;background:var(--ink);color:#F7F3ED}
    @media(min-width:768px){.contact{padding:120px 80px}}
    .contact .sec-label{color:var(--acc);margin-bottom:20px}
    .contact h2{font-family:var(--serif);font-size:clamp(28px,5vw,56px);font-weight:400;line-height:1.12;letter-spacing:-.02em;margin-bottom:60px}
    .contact h2 em{font-style:italic}
    .c-grid{display:grid;grid-template-columns:1fr;gap:48px}
    @media(min-width:768px){.c-grid{grid-template-columns:1fr 1fr;gap:80px}}
    .c-rows{display:flex;flex-direction:column;gap:32px}
    .c-label{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#5C534C;margin-bottom:6px}
    .c-val{font-family:var(--serif);font-size:17px;font-weight:400;color:#F7F3ED}
    .c-val a{color:#F7F3ED;text-decoration:none;transition:color .2s}
    .c-val a:hover{color:var(--acc)}
    .c-val.acc,.c-val.acc a{color:var(--acc)}
    .c-actions{display:flex;flex-direction:column;justify-content:flex-end;gap:20px}
    .c-main-btn{display:inline-flex;align-items:center;gap:8px;border:1px solid #2E2923;color:#F7F3ED;font-family:var(--sans);font-size:11px;letter-spacing:.18em;text-transform:uppercase;padding:16px 32px;text-decoration:none;transition:border-color .2s,color .2s;width:fit-content}
    .c-main-btn:hover{border-color:var(--acc);color:var(--acc)}
    .c-ig{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#5C534C;text-decoration:none;transition:color .2s;display:inline-flex;align-items:center;gap:6px;width:fit-content}
    .c-ig:hover{color:var(--acc)}

    /* FOOTER */
    footer{padding:36px 40px;display:flex;flex-direction:column;align-items:center;gap:16px;border-top:1px solid var(--rule)}
    @media(min-width:768px){footer{padding:40px 80px;flex-direction:row;justify-content:space-between}}
    .f-links{display:flex;gap:32px;align-items:center;flex-wrap:wrap;justify-content:center}
    .f-links a{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);text-decoration:none;transition:color .15s}
    .f-links a:hover{color:var(--ink)}
    .f-copy{font-size:10px;color:var(--rule);letter-spacing:.06em}
  </style>
</head>

<script>
  // Mobile Nav
  document.getElementById('mob-menu').addEventListener('click', () => {
    document.getElementById('mob-nav').classList.toggle('open');
  });
  document.querySelectorAll('#mob-nav a').forEach(a => {
    a.addEventListener('click', () => document.getElementById('mob-nav').classList.remove('open'));
  });

  // Hero Slideshow
  const slides = document.querySelectorAll('.hero-slide');
  let currentSlide = 0;
  if(slides.length > 0){
    setInterval(() => {
      slides[currentSlide].classList.remove('active');
      currentSlide = (currentSlide + 1) % slides.length;
      slides[currentSlide].classList.add('active');
    }, 4000);
  }

  // Portfolio Logic
  const portItems = Array.from(document.querySelectorAll('.port-item'));
  const filters = document.querySelectorAll('.p-filt');
  const loadBtn = document.getElementById('load-more-btn');
  let currentCategory = 'all';
  let itemsToShow = 16;

  function renderPortfolio() {
    let visibleCount = 0;
    portItems.forEach(item => {
      item.classList.remove('visible');
      const cat = item.getAttribute('data-category');
      if (currentCategory === 'all' || currentCategory === cat) {
        if (visibleCount < itemsToShow) {
          item.classList.add('visible');
        }
        visibleCount++;
      }
    });

    if (visibleCount <= itemsToShow) {
      document.getElementById('port-load-container').style.display = 'none';
    } else {
      document.getElementById('port-load-container').style.display = 'flex';
    }
  }

  filters.forEach(btn => {
    btn.addEventListener('click', () => {
      filters.forEach(f => f.classList.remove('active'));
      btn.classList.add('active');
      currentCategory = btn.getAttribute('data-filter');
      itemsToShow = 16; // reset
      renderPortfolio();
    });
  });

  if(loadBtn) {
    loadBtn.addEventListener('click', () => {
      itemsToShow += 16;
      renderPortfolio();
    });
  }

  renderPortfolio();

  // Lightbox Logic
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbClose = document.getElementById('lb-close');

  portItems.forEach(item => {
    item.addEventListener('click', () => {
      const img = item.querySelector('img');
      lbImg.src = img.src;
      lightbox.classList.add('active');
    });
  });

  lbClose.addEventListener('click', () => lightbox.classList.remove('active'));
  lightbox.addEventListener('click', (e) => {
    if(e.target === lightbox) lightbox.classList.remove('active');
  });
  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape') lightbox.classList.remove('active');
  });
</script>
</body>
</html>
